<!DOCTYPE html>
<html lang="hi" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PrivQuotes – JSON-Driven Privacy-First Quotes Engine by PrivMITLab" />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon.png" />
    <link rel="icon" type="image/png" href="icons/icon.png" />

    <!-- ═══════════════════════════════════════════════════
       GOOGLE FONTS — All fonts used across all quotes
       Hindi: Hind (covers Devanagari script)
       English/Hinglish: Poppins, Playfair Display,
                         Space Mono, Raleway, Montserrat
       ═══════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;600;700&family=Raleway:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet" />

    <title>PrivQuotes – PrivMITLab</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <div id="app" class="app-shell">

        <!-- ══════════════════════════════════════
       TOP BAR
  ══════════════════════════════════════ -->
        <header class="topbar" role="banner">
            <div class="topbar__brand">
                <img src="icons/icon.png" alt="PrivQuotes Icon" class="topbar__icon" width="36" height="36" />
                <div class="topbar__titles">
                    <h1 class="topbar__name">PrivQuotes</h1>
                    <p class="topbar__tagline">Feel the Words. Own the Experience.</p>
                </div>
            </div>

            <div class="topbar__controls">
                <!-- Search -->
                <div class="search-wrap" role="search">
                    <span class="search-icon" aria-hidden="true">🔍</span>
                    <input type="search" id="searchInput" class="search-input"
                        placeholder="Search quotes, tags, authors…" aria-label="Search quotes" autocomplete="off"
                        spellcheck="false" />
                    <button class="search-clear" id="searchClear" aria-label="Clear search" hidden>✕</button>
                </div>

                <!-- Filters -->
                <div class="filter-group" role="group" aria-label="Filter controls">
                    <select id="languageFilter" class="filter-select" aria-label="Filter by language">
                        <option value="all">🌐 All</option>
                        <option value="english">🇬🇧 English</option>
                        <option value="hindi">🇮🇳 Hindi</option>
                        <option value="hinglish">🔀 Hinglish</option>
                    </select>

                   <select id="categoryFilter" class="filter-select" aria-label="Filter by category">
    <option value="all">📂 All</option>
    <option value="sad">😢 Sad</option>
    <option value="love">❤️ Love</option>
    <option value="motivational">💪 Motivation</option>
    <option value="reality">🧠 Reality</option>
    <option value="life">🌿 Life</option>
    <option value="attitude">😎 Attitude</option>
    <option value="emotional">🥺 Emotional</option>
    <option value="friendship">🤝 Friendship</option>
    <option value="heartbreak">💔 Heartbreak</option>
    <option value="success">🏆 Success</option>
    <option value="funny">😂 Funny</option>
    <option value="spiritual">🙏 Spiritual</option>
    <option value="patriotic">🇮🇳 Patriotic</option>
    <option value="wisdom">📖 Wisdom</option>
    <option value="self-love">🌸 Self Love</option>
    <option value="trust">🔐 Trust</option>
    <option value="betrayal">🗡️ Betrayal</option>
    <option value="parents">👨‍👩‍👧 Parents</option>
    <option value="anger">🔥 Anger</option>
    <option value="loneliness">🌙 Loneliness</option>
    <option value="happiness">😊 Happiness</option>
    <option value="struggle">⚔️ Struggle</option>
    <option value="respect">🫡 Respect</option>
    <option value="deep">🌊 Deep Thoughts</option>
    <option value="savage">👑 Savage</option>
    <option value="islamic">🕌 Islamic</option>
    <option value="shayari">✍️ Shayari</option>
    <option value="good-morning">🌅 Good Morning</option>
    <option value="good-night">🌙 Good Night</option>
</select>
                    <button id="themeToggle" class="btn btn--icon" aria-label="Toggle theme" title="Toggle theme">
                        <span id="themeIcon">☀️</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- ══════════════════════════════════════
       STATS BAR
  ══════════════════════════════════════ -->
        <div class="stats-bar" aria-live="polite" aria-atomic="true">
            <span id="quoteCount" class="stats-count"></span>
            <span class="stats-brand">PrivMITLab · Open Source · Privacy First</span>
        </div>

        <!-- ══════════════════════════════════════
       GALLERY (Masonry-style flex grid)
  ══════════════════════════════════════ -->
        <main id="gallery" class="gallery" role="main" aria-label="Quotes gallery"></main>

        <!-- ══════════════════════════════════════
       EMPTY STATE
  ══════════════════════════════════════ -->
        <div id="emptyState" class="empty-state" hidden role="status">
            <div class="empty-state__icon">🔍</div>
            <h2 class="empty-state__title">No quotes found</h2>
            <p class="empty-state__desc">Try different keywords or reset filters.</p>
            <button class="btn btn--primary" id="resetFilters">Reset Filters</button>
        </div>

        <!-- ══════════════════════════════════════
       LOADING SKELETON
  ══════════════════════════════════════ -->
        <div id="loadingState" class="loading-state" role="status" aria-label="Loading quotes">
            <div class="skeleton-grid">
                <div class="skeleton-card skeleton-card--tall" aria-hidden="true"></div>
                <div class="skeleton-card" aria-hidden="true"></div>
                <div class="skeleton-card skeleton-card--wide" aria-hidden="true"></div>
                <div class="skeleton-card" aria-hidden="true"></div>
                <div class="skeleton-card skeleton-card--tall" aria-hidden="true"></div>
                <div class="skeleton-card" aria-hidden="true"></div>
            </div>
        </div>

        <!-- ══════════════════════════════════════
       FULLSCREEN MODAL
  ══════════════════════════════════════ -->
        <div id="quoteModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalQuoteText" hidden>
            <div class="modal__overlay" id="modalOverlay"></div>
            <div class="modal__container">

                <button class="modal__close" id="modalClose" aria-label="Close">✕</button>
                <button class="modal__nav modal__nav--prev" id="modalPrev" aria-label="Previous">‹</button>
                <button class="modal__nav modal__nav--next" id="modalNext" aria-label="Next">›</button>

                <div class="modal__card" id="modalCard">
                    <div class="modal__quote-wrap" id="modalQuoteWrap">
                        <p class="modal__quote-text" id="modalQuoteText"></p>
                    </div>
                    <div class="modal__meta" id="modalMeta">
                        <div class="modal__meta-tags" id="modalTags"></div>
                        <div class="modal__meta-info" id="modalInfo"></div>
                    </div>
                </div>

                <div class="modal__actions">
                    <button class="btn btn--action" id="copyBtn" aria-label="Copy quote">
                        <span class="btn__icon">📋</span>
                        <span class="btn__label">Copy</span>
                    </button>
                    <button class="btn btn--action" id="downloadBtn" data-ready="false" aria-label="Download image">
                        <span class="btn__icon" id="downloadBtnIcon">⏳</span>
                        <span class="btn__label" id="downloadBtnLabel">Loading…</span>
                    </button>
                    <button class="btn btn--action" id="shareBtn" aria-label="Share quote">
                        <span class="btn__icon">🔗</span>
                        <span class="btn__label">Share</span>
                    </button>
                </div>

            </div>
        </div>

        <!-- ══════════════════════════════════════
       TOAST NOTIFICATION
  ══════════════════════════════════════ -->
        <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

        <!-- ══════════════════════════════════════
       FOOTER
  ══════════════════════════════════════ -->
        <footer class="footer" role="contentinfo">
            <p>
                <img src="icons/icon.png" alt="" width="18" height="18"
                    style="vertical-align:middle;border-radius:4px;margin-right:6px;" />
                <strong>PrivMITLab</strong> · PrivQuotes v1.0.0 · Open Source ·
                <a href="https://github.com/privmitlab/privquotes" target="_blank" rel="noopener noreferrer"
                    class="footer__link">GitHub</a>
            </p>
            <p class="footer__sub">No tracking. No analytics. No servers. 100% yours.</p>
        </footer>

    </div><!-- /#app -->

    <!-- ════════════════════════════════════════════════════
     html2canvas — LOCAL FIRST, CDN FALLBACK
     Loaded BEFORE app.js (no defer/async)
     ════════════════════════════════════════════════════ -->
    <script src="libs/html2canvas.min.js" onerror="window.__h2cLocalFailed=true;"></script>

    <script>
        if (window.__h2cLocalFailed) {
            (function () {
                var s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                s.onload = function () { document.dispatchEvent(new CustomEvent('h2c:ready')); };
                s.onerror = function () { window.__h2cAllFailed = true; document.dispatchEvent(new CustomEvent('h2c:failed')); };
                document.head.appendChild(s);
            }());
        } else if (typeof window.html2canvas === 'function') {
            document.dispatchEvent(new CustomEvent('h2c:ready'));
        }
    </script>

    <script type="module" src="app.js"></script>

</body>

</html>
